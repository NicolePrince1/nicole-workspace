<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <style>
      :root {
        color-scheme: only light;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ff1f1f;
        color: #ffffff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .wrap {
        text-align: center;
        padding: 2rem;
      }
      h1 {
        margin: 0;
        font-size: clamp(3rem, 10vw, 6rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
        font-weight: 800;
      }
      p {
        margin: 1rem 0 0;
        font-size: clamp(1rem, 2.4vw, 1.25rem);
        opacity: 0.95;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Hello World</h1>
      <p>Built by Nicole</p>
    </main>
  </body>
</html>
